name: Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'test skip')"

    steps:
    - uses: actions/checkout@v4
    - uses: https://codeberg.org/mlugg/setup-zig@v2

    - name: Ape Tests
      run: zig build test-ape --release=safe -Dphi-build-daemon=false

    - name: Soft Tests
      run: zig build test-soft --release=safe

    - name: Flint Tests
      run: zig build test-flint --release=safe

    - name: Phi Tests
      run: zig build test-phi --release=safe -Dphi-build-daemon=false
